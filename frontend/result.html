<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result | TaxCompare</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/result.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <header><h1>Tax Calculation Result</h1></header>
    <main class="container" id="printArea">
        <div id="winnerBanner" class="banner"></div>
        <div class="comparison-grid">
            <div class="regime-card new"><h2>New Regime</h2><div class="details" id="newDetails"></div></div>
            <div class="regime-card old"><h2>Old Regime</h2><div class="details" id="oldDetails"></div></div>
        </div>
        <div class="chart-container"><canvas id="taxChart"></canvas></div>
        <div id="suggestions" class="suggestions"></div>
        <div class="actions">
            <button id="pdfBtn" class="primary-btn">Download PDF</button>
            <button id="shareBtn" class="secondary-btn">Share Summary</button>
            <a href="/" class="back-btn">Calculate Again</a>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
